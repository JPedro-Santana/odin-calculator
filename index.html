<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="shortcut icon" href="/favicon/apple-calculator.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
      <div class="calculator">
        <div id="display"></div>
        <div class="btn-grid top">
          <button class="btn-light" id="clear">C</button>
          <button class="btn-light wide" id="delete">Delete</button>
          <button class="btn-orange operators">÷</button>
        </div>
        <div class="btn-grid">
          <button class="number">7</button>
          <button class="number">8</button>
          <button class="number">9</button>
          <button class="btn-orange operators">x</button>
          <button class="number">4</button>
          <button class="number">5</button>
          <button class="number">6</button>
          <button class="btn-orange operators">-</button>
          <button class="number">1</button>
          <button class="number">2</button>
          <button class="number">3</button>
          <button class="btn-orange operators">+</button>
          <button class="wide number">0</button>
          <button id="decimal">.</button>
          <button class="btn-orange" id="equal">=</button>
        </div>
      </div>
    <script src="script.js"></script>
  </body>
</html>
